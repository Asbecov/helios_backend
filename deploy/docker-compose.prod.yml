services:
  api:
    environment:
      HELIOS_BACKEND_ENVIRONMENT: production
      HELIOS_BACKEND_RELOAD: "False"
      HELIOS_BACKEND_RATE_LIMIT_TRUST_FORWARDED_IP: "True"

  taskiq-worker:
    environment:
      HELIOS_BACKEND_ENVIRONMENT: production
      HELIOS_BACKEND_RELOAD: "False"

  taskiq-scheduler:
    environment:
      HELIOS_BACKEND_ENVIRONMENT: production
      HELIOS_BACKEND_RELOAD: "False"

  telegram-bot:
    environment:
      HELIOS_BACKEND_ENVIRONMENT: production
      HELIOS_BACKEND_RELOAD: "False"

  static:
    image: nginx:1.27-alpine
    restart: always
    volumes:
      - ./helios_backend/static:/usr/share/nginx/html:ro

  caddy:
    image: caddy
    restart: always
    depends_on:
      marzban:
        condition: service_started
      api:
        condition: service_started
      static:
        condition: service_started
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL:?Set CADDY_EMAIL in .env}
      API_DOMAIN: ${API_DOMAIN:?Set API_DOMAIN in .env}
      SUBSCRIPTION_DOMAIN: ${SUBSCRIPTION_DOMAIN:?Set SUBSCRIPTION_DOMAIN in .env}
      SITE_DOMAIN: ${SITE_DOMAIN:?Set SITE_DOMAIN in .env}
      GRPC_ROUTE: ${GRPC_ROUTE:?Set GRPC_ROUTE in .env}
      VLESS_PORT: ${VLESS_PORT:?Set VLESS_PORT in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/lib/marzban:/var/lib/marzban
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  marzban:
    image: gozargah/marzban:latest
    restart: always
    env_file: ./deploy/.env
    volumes:
      - /var/lib/marzban:/var/lib/marzban

volumes:
  caddy-data:
  caddy-config:
